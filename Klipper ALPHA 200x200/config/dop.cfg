#[mcu 1]
#serial: /dev/ttyUSB1
#serial: /dev/serial/by-path/pci-0000:00:1d.1-usb-0:2:1.0-port0
#restart_method: command

#[output_pin POWER_OFF]
#pin: 1:PH5
#   The pin to configure as an output. This parameter must be
#   provided.
#static_value:
#   If this is set, then the pin is assigned to this value at startup
#   and the pin can not be changed during runtime. A static pin uses
#   slightly less ram in the micro-controller. The default is to use
#   runtime configuration of pins.
#value: 1
#   The value to initially set the pin to during MCU configuration.
#   The default is 0 (for low voltage).
#shutdown_value: 0

[gcode_macro POWER_OFF_PRINTER]
gcode:
  {action_call_remote_method(
    "set_device_power", device="printer", state="off"
  )}

[gcode_macro POWER_ON_HEATERS]
gcode:
  {action_call_remote_method(
    "set_device_power", device="printer", state="on"
  )}

#[heater_fan driver]
#pin: 1:PH6
#kick_start_time: 0.300

[homing_override]
gcode:
    G1 z5
    G28 X Y
    G28 Z
    G1 z5
axes:z
#set_position_x:
#set_position_y:
set_position_z: 0

[gcode_macro LOAD_FILAMENT]
variable_load_distance:  50
variable_purge_distance:  20
gcode:
    {% set speed = params.SPEED|default(300) %}
    {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity  * 60 %}
    SAVE_GCODE_STATE NAME=load_state
    G91
    G92 E0
    G1 E{load_distance} F{max_velocity} # fast-load
    G1 E{purge_distance} F{speed} # purge
    RESTORE_GCODE_STATE NAME=load_state

[gcode_macro UNLOAD_FILAMENT]
variable_unload_distance: 50
variable_purge_distance:  20
gcode:
    {% set speed = params.SPEED|default(300) %}
    {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity  * 60 %}
    SAVE_GCODE_STATE NAME=unload_state
    G91
    G92 E0
    G1 E{purge_distance} F{speed} # purge
    G1 E-{unload_distance} F{max_velocity} # fast-unload
    RESTORE_GCODE_STATE NAME=unload_state

[gcode_macro FILAMENT_CHANGE]
description: Продвинутая смена филамента во время печати
variable_active: False
gcode:
    # Проверяем, не запущена ли уже смена филамента
    {% if printer["gcode_macro FILAMENT_CHANGE"].active %}
    {% else %}
        # Устанавливаем флаг активности
        SET_GCODE_VARIABLE MACRO=FILAMENT_CHANGE VARIABLE=active VALUE=True
        # Сохраняем состояние печати
        SAVE_GCODE_STATE NAME=FILAMENT_CHANGE_STATE
        # Ставим печать на паузу
        PAUSE
        # Расчет безопасного подъема Z
        {% set z_hop = 10.0 %}
        {% set max_z = printer.toolhead.axis_maximum.z|float %}
        {% set cur_z = printer.toolhead.position.z|float %}
        {% set safe_z = z_hop if cur_z + z_hop <= max_z else max_z - cur_z %}
        # Поднимаем сопло над моделью
        G91
        {% if safe_z > 0 %}
            G1 Z{safe_z} F900
        {% endif %}
        G90
        # Паркуем голову
        G1 X10 Y10 F6000
        # Выгружаем старый филамент
        G91
        G1 E-5 F1800
        G1 E-60 F600
        G90
    {% endif %}

[gcode_macro LOAD_FILAMENT_CHANGE]
description: Загрузка нового филамента после FILAMENT_CHANGE
gcode:
    # Подача нового филамента
    G91
    G1 E40 F600       # быстрая подача
    G1 E20 F300       # медленная подача
    G90
    # Purge нового пластика
    G91
    G1 E25 F200
    G90
    # Небольшой откат чтобы убрать давление в сопле
    G91
    G1 E-1 F1800
    G90
    # Сбрасываем флаг смены филамента
    SET_GCODE_VARIABLE MACRO=FILAMENT_CHANGE VARIABLE=active VALUE=False

[gcode_macro M600]
gcode:
    FILAMENT_CHANGE

