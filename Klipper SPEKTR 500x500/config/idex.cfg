[stepper_x]
step_pin:PC14
dir_pin:!PC13
enable_pin:!PC15
microsteps: 32
rotation_distance: 40
full_steps_per_rotation:200  #set to 400 for 0.9 degree stepper
endstop_pin:PA14
position_min: -80
position_endstop: -80
position_max: 500
homing_speed: 80
homing_retract_dist:3
homing_retract_speed:20
second_homing_speed:3
#homing_positive_dir:true
#step_pulse_duration:0.000008

[extruder]
step_pin:PB5
dir_pin:!PB4
enable_pin:!PB6
microsteps:32
rotation_distance:7.864#7.710#21.58
#rotation_distance: 25.12	#Bondtech 5mm Drive Gears
#gear_ratio: 3:1
full_steps_per_rotation: 200	#200 for 1.8 degree, 400 for 0.9 degree
nozzle_diameter: 0.400
filament_diameter: 1.750
min_temp: 0
max_temp: 450
heater_pin: PB1
sensor_type: T-D500
sensor_pin: PC1
pullup_resistor: 4700
#control: pid
#pid_kp= 25.194
#pid_ki= 1.272
#pid_kd= 124.713
min_extrude_temp: 100
pressure_advance: 0.02
pressure_advance_smooth_time: 0.010
max_extrude_only_distance: 100

[gcode_macro _PARK_extruder]
gcode:
    SAVE_GCODE_STATE NAME=park0
    G90
    G1 X-79 F10000
    RESTORE_GCODE_STATE NAME=park0

# Activate the primary extruder
[gcode_macro T0]
gcode:
    PARK_{printer.toolhead.extruder}
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_DUAL_CARRIAGE CARRIAGE=0
    SET_GCODE_OFFSET Y=0

[dual_carriage]
axis:x
step_pin: PD2
dir_pin: PD1
enable_pin: !PD3
microsteps: 32
full_steps_per_rotation: 200  #set to 400 for 0.9 degree stepper
rotation_distance: 40
endstop_pin: ^PA13
position_endstop: 587
position_min: 11
position_max: 587
homing_speed: 80
homing_retract_dist:3
homing_retract_speed:20
second_homing_speed:3
#safe_distance: 90

[tmc2208 dual_carriage]
uart_pin: PD0
#diag_pin: PB14
#driver_SGTHRS: 110
#interpolate: True
run_current: 1
hold_current: 1
stealthchop_threshold: 99999
#driver_TBL: 3
#driver_TOFF: 3
#driver_HSTRT: 4
#driver_HEND: 0

[tmc2208 extruder1]
uart_pin: PD15
run_current: 0.8
hold_current: 0.8
interpolate: True
stealthchop_threshold: 0


[extruder1]
step_pin: PC7
dir_pin: PC6
enable_pin: !PC8
microsteps:32
rotation_distance:7.864#7.710#21.58
#rotation_distance: 25.12	#Bondtech 5mm Drive Gears
#gear_ratio: 3:1
full_steps_per_rotation: 200	#200 for 1.8 degree, 400 for 0.9 degree
nozzle_diameter: 0.400
filament_diameter: 1.750
min_temp: 0
max_temp: 450
heater_pin: PB0
sensor_type: T-D500
sensor_pin: PC2
pullup_resistor: 4700
control: pid
pid_Kp=34.510
pid_Ki=1.717
pid_Kd=173.410
min_extrude_temp: 100
pressure_advance: 0.0
pressure_advance_smooth_time: 0.010
max_extrude_only_distance: 100

[gcode_macro _PARK_extruder1]
gcode:
    SAVE_GCODE_STATE NAME=park1
    G90
    G1 X587 F10000
    RESTORE_GCODE_STATE NAME=park1

[gcode_macro T1]
gcode:
    PARK_{printer.toolhead.extruder}
    ACTIVATE_EXTRUDER EXTRUDER=extruder1
    SET_DUAL_CARRIAGE CARRIAGE=1
    SET_GCODE_OFFSET x=0

[gcode_macro ACTIVATE_COPY_MODE]
gcode:
 SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
 G1 X-79
 ACTIVATE_EXTRUDER EXTRUDER=extruder
 SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
 G1 X587
 SET_DUAL_CARRIAGE CARRIAGE=1 MODE=COPY
 SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder

# A helper script to activate mirror mode
[gcode_macro ACTIVATE_MIRROR_MODE]
gcode:
 SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
 G1 X-79
 ACTIVATE_EXTRUDER EXTRUDER=extruder
 SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
 G1 X587
 SET_DUAL_CARRIAGE CARRIAGE=1 MODE=MIRROR
 SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder