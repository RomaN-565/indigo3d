[include idex.cfg]
#[include mainsail.cfg]
[include fluidd.cfg]
[include obem.cfg]
[exclude_object]

[tmc2208 stepper_x]
uart_pin: PE6
run_current: 1
hold_current: 1
interpolate: True
stealthchop_threshold: 99999

#[tmc2208 stepper_y]
#uart_pin: PE3
#run_current: 1.5
#hold_current: 1.5
#interpolate: True
#stealthchop_threshold: 0

[tmc2208 stepper_z]
uart_pin: PB7 
run_current: 1.6
hold_current: 1.6
interpolate: True
stealthchop_threshold: 99999

[tmc2208 stepper_z1]
uart_pin: PD4
interpolate: True
run_current: 1.6
hold_current: 1.6
stealthchop_threshold: 99999

[tmc2208 extruder]
uart_pin: PB3
run_current: 0.8
hold_current: 0.8
interpolate: True
stealthchop_threshold: 0

