[stepper_y]
step_pin:!PE5
dir_pin:!PE4
enable_pin:!PD14
microsteps:32
rotation_distance:45#19.757#7.950#11.84#9#8# 7.942
gear_ratio: 3:4
#gear_ratio: 1.333:1
full_steps_per_rotation:200  #set to 400 for 0.9 degree stepper
endstop_pin:PA15
position_min: 0
position_endstop: 500
position_max: 500
homing_speed: 60
homing_retract_dist:10
homing_retract_speed:20
second_homing_speed:3
homing_positive_dir: true
#step_pulse_duration:0.000008

[stepper_z]
step_pin:PE1
dir_pin:PE0
enable_pin:!PE2
microsteps: 32
rotation_distance: 5
full_steps_per_rotation: 200
endstop_pin:probe: z_virtual_endstop#PB15 #probe: z_virtual_endstop ## PB12 for Z-max; endstop have'!' is NO

##  Z-position of nozzle (in mm) to z-endstop trigger point relative to print surface (Z0)
##  (+) value = endstop above Z0, (-) value = endstop below
##	Increasing position_endstop brings nozzle closer to the bed
##  After you run Z_ENDSTOP_CALIBRATE, position_endstop will be stored at the very end of your config
#position_endstop:-5
position_max: 525
position_min:-10
homing_positive_dir: false
homing_speed: 8
homing_retract_dist:3
homing_retract_speed:3
second_homing_speed:2

[stepper_z1]
step_pin:PD6
dir_pin:PD5
enable_pin:!PD7
microsteps:16
rotation_distance: 5
full_steps_per_rotation: 200

