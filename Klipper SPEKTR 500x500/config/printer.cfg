[heater_bed]
heater_pin: PD9
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC0
max_power: 1.0
#control = pid
#pid_kp = 71.039
#pid_ki = 2.223
#pid_kd = 567.421
min_temp: 0
max_temp: 120

#fan for printed model FAN0
[fan]
pin: PA0

#[fan]
#pin: PA3

#[fan extruder1]
#pin: PA0

[mcu]
# The hardware use USART1 PA10/PA9 connect to RK3328
#serial: /dev/serial/by-id/usb-Klipper_stm32f407xx_2C003B001250314335393520-if00
serial: /dev/ttyS0
restart_method: command

[mcu rpi]
serial: /tmp/klipper_host_mcu

[printer]
kinematics: hybrid_corexy
max_velocity: 300
max_accel: 1500
max_accel_to_decel: 1500
max_z_velocity: 15
max_z_accel: 100
square_corner_velocity: 2.0

[bltouch]
sensor_pin:^PC5#^PC5 #^PD11
control_pin: PA8
pin_move_time: 0.680
#stow_on_each_sample: True
#probe_with_touch_mode: False
pin_up_reports_not_triggered: True
pin_up_touch_mode_reports_triggered: True
#set_output_mode:
x_offset:-48.823
y_offset:0
#z_offset:0
speed: 3
lift_speed:2
samples: 2
samples_result: average
sample_retract_dist: 5.0
samples_tolerance: 0.5
samples_tolerance_retries: 1

[safe_z_home]
home_xy_position: 250, 250 # Change coordinates to the center of your print bed
speed: 60
z_hop: 10               # Move up 10mm
z_hop_speed: 2

[bed_mesh]
speed: 30
horizontal_move_z: 5
mesh_min: 35, 35
mesh_max: 400, 400
probe_count: 6, 6
mesh_pps: 4, 4

[bed_screws]
screw1: 15, 15
screw2: 480, 15
screw3: 480, 480
screw4: 15, 480

[screws_tilt_adjust]
screw1:63,480
#   The (X, Y) coordinate of the first bed leveling screw. This is a
#   position to command the nozzle to so that the probe is directly
#   above the bed screw (or as close as possible while still being
#   above the bed). This is the base screw used in calculations. This
#   parameter must be provided.
screw1_name: FL
#   An arbitrary name for the given screw. This name is displayed when
#   the helper script runs. The default is to use a name based upon
#   the screw XY location.
screw2:480,480
screw2_name:FR
screw3:480,15
screw3_name:BR
screw4:63,15
screw4_name:BL
#...
#   Additional bed leveling screws. At least two screws must be
#   defined.
speed: 50
#   The speed (in mm/s) of non-probing moves during the calibration.
#   The default is 50.
horizontal_move_z: 5
#   The height (in mm) that the head should be commanded to move to
#   just prior to starting a probe operation. The default is 5.
screw_thread: CW-M5
#   The type of screw used for bed leveling, M3, M4, or M5, and the
#   rotation direction of the knob that is used to level the bed.
#   Accepted values: CW-M3, CCW-M3, CW-M4, CCW-M4, CW-M5, CCW-M5.
#   Default value is CW-M3 which most printers use. A clockwise
#   rotation of the knob decreases the gap between the nozzle and the
#   bed. Conversely, a counter-clockwise rotation increases the gap.


[filament_switch_sensor filament_sensor_L]
switch_pin: PE14
runout_gcode: PAUSE
#   BEEP P=1500
   
[filament_switch_sensor filament_sensor_R]
switch_pin: PE13
runout_gcode: PAUSE
#   BEEP P=1500

