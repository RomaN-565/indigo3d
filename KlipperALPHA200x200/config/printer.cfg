step_pin: PL3
dir_pin: !PL1
enable_pin: !PK0
full_steps_per_rotation: 200
microsteps: 16 #было
#rotation_distance: 16.232 #было при 16mikro
#rotation_distance: 64.44104 #было
#microsteps: 32
rotation_distance: 8.032
endstop_pin: ^PD3
#endstop_pin: probe:z_virtual_endstop
#position_endstop: 0
position_min: -5
position_max: 500
homing_speed: 80
homing_retract_dist: 3.0
homing_retract_speed: 30
second_homing_speed: 1
homing_positive_dir: false

