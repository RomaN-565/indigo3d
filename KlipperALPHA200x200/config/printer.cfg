[extruder]
step_pin: PA4
dir_pin: PA6
enable_pin: !PA2
microsteps: 16
rotation_distance: 31.428 #30
#rotation_distance: 63.3709044388224 #было
#rotation_distance: 63.396262944
#rotation_distance: 62.582688
#gear_ratio: 3:1
max_extrude_cross_section: 7.0
nozzle_diameter: 0.400
filament_diameter: 1.750
max_extrude_only_distance: 100
max_extrude_only_velocity: 50
max_extrude_only_accel: 5000
heater_pin: PB4
sensor_type: ATC Semitec 104GT-2
#sensor_type: EPCOS 100K B57560G104F
sensor_pin: PK5
pullup_resistor: 4700
#control: pid
#pid_Kp=28.781
#pid_Ki=1.958
#pid_Kd=105.771
min_extrude_temp: 0
min_temp: -100
max_temp: 360
max_extrude_only_distance: 1500

[heater_bed]
heater_pin: PH5
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PK6
#control: pid
#pid_Kp=73.517
#pid_Ki=2.593
#pid_Kd=521.050
min_temp: 0
max_temp: 160

[fan]
pin: PH6
cycle_time: 0.015

[heater_fan heater_fan]
pin: PH4
kick_start_time: 0.300

[filament_switch_sensor filament_sensor]
switch_pin: PD0
runout_gcode: PAUSE
   BEEP P=1500

[mcu]
#serial: /dev/ttyUSB0
serial: /dev/serial/by-path/pci-0000:00:1d.1-usb-0:1:1.0-port0
restart_method: command

[adxl345]   # Красный плюс, серый минус
cs_pin: PG5 # желтый
spi_software_sclk_pin: PE3 # фиолетовый
spi_software_mosi_pin: PL6 # зелёный
spi_software_miso_pin: PL2 # ораньжевый
#axes_map: x, y
#   The accelerometer axis for each of the printer's X, Y, and Z axes.
#   This may be useful if the accelerometer is mounted in an
#   orientation that does not match the printer orientation. For
#   example, one could set this to "y, x, z" to swap the X and Y axes.
#   It is also possible to negate an axis if the accelerometer
#   direction is reversed (eg, "x, z, -y"). The default is "x, y, z".
rate: 3200

[resonance_tester]
accel_chip: adxl345
max_freq: 135
accel_per_hz: 60
probe_points: 100, 100, 25
sweeping_accel: 400

[input_shaper]
#shaper_freq_x: 45.2
#shaper_type_x: ei
#shaper_freq_y: 26.2
#shaper_type_y: 2hump_ei

[printer]
kinematics: corexy
max_velocity: 500
max_accel: 5000
max_z_velocity: 10
max_z_accel: 100
square_corner_velocity: 5.0

[gcode_arcs]
#resolution: 1.0

[display]
lcd_type: hd44780
rs_pin: PH1
e_pin: PH0
d4_pin: PA1
d5_pin: PA3
d6_pin: PA5
d7_pin: PA7
encoder_pins: ^PC6, ^PC4
click_pin:  ^!PC2
kill_pin: ^!PG0

[bed_mesh]
speed: 50
horizontal_move_z: 10
mesh_min: 6, 6
mesh_max: 200, 200
probe_count: 5, 5
mesh_pps: 2, 3
algorithm: lagrange
bicubic_tension: 0.2
fade_start: 1

[bed_screws]
screw1: 15, 15
screw2: 200, 15
screw3: 200, 195
screw4: 15, 195

[display_status]

[output_pin BEEPER_pin]
pin: PC0
pwm: True
value: 0
shutdown_value: 0
cycle_time: 0.001
scale: 1000

[gcode_macro BEEP]
gcode:
    {% set frequency = params.S|default(1000)|float %}
    {% set duration = params.P|default(100)|float %}
    SET_PIN PIN=BEEPER_pin VALUE={frequency}
    G4 P{duration}
    SET_PIN PIN=BEEPER_pin VALUE=0

